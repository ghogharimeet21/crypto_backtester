<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MetaData Live Inspector</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2128;--border:#30363d;
  --text:#c9d1d9;--muted:#8b949e;--muted2:#484f58;
  --green:#3fb950;--green-dim:rgba(63,185,80,.18);
  --blue:#58a6ff;--blue-dim:rgba(88,166,255,.15);
  --yellow:#e3b341;--yellow-dim:rgba(227,179,65,.15);
  --purple:#bc8cff;--purple-dim:rgba(188,140,255,.15);
  --red:#f85149;--red-dim:rgba(248,81,73,.18);
  --orange:#ffa657;
  --badge:#21262d;
  --indent:18px;
  --font:'Cascadia Code','Fira Code',Consolas,monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:12.5px;line-height:1.5}

/* ── layout ── */
.app{display:grid;grid-template-rows:52px 1fr;height:100vh;overflow:hidden}
header{display:flex;align-items:center;gap:10px;padding:0 18px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
header h1{font-size:13px;font-weight:700;color:var(--text);letter-spacing:.3px}
.spacer{flex:1}
.hstats{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:14px}
.hstats strong{color:var(--text)}
#error-msg{color:var(--red);display:none}

/* pulse dot */
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

main{overflow-y:auto;padding:14px 18px 60px}

/* ── tree ── */
ul.tree-root,ul.children{list-style:none}
ul.children{margin-left:calc(var(--indent) + 5px);padding-left:11px;border-left:1px solid var(--border)}
ul.children.collapsed{display:none}
.node{position:relative}

/* ── row ── */
.row{display:flex;align-items:center;gap:5px;padding:2px 3px;border-radius:4px;cursor:pointer;user-select:none;white-space:nowrap;transition:background .12s}
.row:hover{background:rgba(255,255,255,.035)}
.row.flash{animation:flash .65s ease-out}
@keyframes flash{0%{background:var(--green-dim)}100%{background:transparent}}

.caret{width:13px;height:13px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--muted2);transition:transform .18s;font-size:9px}
.caret.open{transform:rotate(90deg)}
.caret.leaf{visibility:hidden}
.icon{flex-shrink:0;font-size:13px;line-height:1}

/* labels */
.lbl{color:var(--text)}
.lbl.root   {color:var(--blue);font-weight:700;font-size:14px}
.lbl.section{color:var(--yellow);font-weight:600}
.lbl.symbol {color:var(--orange);font-weight:700}
.lbl.tf     {color:var(--purple)}
.lbl.date   {color:var(--muted);font-size:11px}
.lbl.ind    {color:var(--green);font-size:11.5px}

/* badges */
.bdg{font-size:10px;padding:1px 5px;border-radius:9px;background:var(--badge);border:1px solid var(--border);color:var(--muted);flex-shrink:0}
.bdg.g{color:var(--green);border-color:rgba(63,185,80,.3)}
.bdg.b{color:var(--blue);border-color:rgba(88,166,255,.3)}
.bdg.p{color:var(--purple);border-color:rgba(188,140,255,.3)}
.bdg.y{color:var(--yellow);border-color:rgba(227,179,65,.3)}
.bdg.r{color:var(--red);border-color:rgba(248,81,73,.3)}

/* ── OHLCV table ── */
.candle-wrap{
  margin:3px 0 5px calc(var(--indent)*2 + 18px);
  border:1px solid var(--border);
  border-radius:6px;
  overflow:hidden;
  max-height:320px;
  overflow-y:auto;
  background:var(--surface);
}
.candle-table{width:100%;border-collapse:collapse;font-size:11px}
.candle-table th{
  position:sticky;top:0;
  background:var(--surface2);
  color:var(--muted);
  font-weight:600;
  padding:5px 8px;
  text-align:right;
  border-bottom:1px solid var(--border);
  white-space:nowrap;
}
.candle-table th:first-child,.candle-table td:first-child{text-align:left}
.candle-table td{padding:3px 8px;border-bottom:1px solid rgba(48,54,61,.5);vertical-align:middle}
.candle-table tr:last-child td{border-bottom:none}
.candle-table tr:hover td{background:rgba(255,255,255,.025)}

/* candle body pill */
.cbody{
  display:inline-block;width:8px;height:12px;border-radius:2px;margin-right:4px;vertical-align:middle;flex-shrink:0;
}
.bull{background:var(--green)}
.bear{background:var(--red)}
.doji{background:var(--muted2)}

/* close colour */
.close-bull{color:var(--green)}
.close-bear{color:var(--red)}

/* volume bar */
.vol-cell{display:flex;align-items:center;gap:5px}
.vol-bar-wrap{width:60px;height:4px;border-radius:2px;background:var(--border);overflow:hidden;flex-shrink:0}
.vol-bar-fill{height:100%;border-radius:2px;background:var(--blue);min-width:1px}
.vol-num{color:var(--muted);font-size:10px;white-space:nowrap}

/* ── indicator value table ── */
.ind-wrap{
  margin:3px 0 5px calc(var(--indent)*2 + 18px);
  border:1px solid var(--border);
  border-radius:6px;
  overflow:hidden;
  max-height:260px;
  overflow-y:auto;
  background:var(--surface);
}
.ind-table{width:100%;border-collapse:collapse;font-size:11px}
.ind-table th{
  position:sticky;top:0;
  background:var(--surface2);
  color:var(--muted);
  font-weight:600;
  padding:5px 8px;
  border-bottom:1px solid var(--border);
}
.ind-table th:last-child,.ind-table td:last-child{text-align:right}
.ind-table td{padding:3px 8px;border-bottom:1px solid rgba(48,54,61,.5);vertical-align:middle}
.ind-table tr:last-child td{border-bottom:none}
.ind-table tr:hover td{background:rgba(255,255,255,.025)}
.ind-val-cell{display:flex;align-items:center;gap:6px;justify-content:flex-end}
.ind-bar-wrap{width:80px;height:3px;border-radius:2px;background:var(--border)}
.ind-bar-fill{height:100%;border-radius:2px;background:var(--green)}

/* loading / error inside table area */
.tbl-msg{
  padding:10px 14px;
  font-size:11px;
  color:var(--muted);
  display:flex;
  align-items:center;
  gap:6px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:6px;
  margin:3px 0 5px calc(var(--indent)*2 + 18px);
}

/* empty state */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--muted);gap:8px;font-size:12px}

/* scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted2)}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="dot"></div>
    <h1>MetaData Live Inspector</h1>
    <span class="spacer"></span>
    <div class="hstats">
      <span id="error-msg">⚠ fetch failed</span>
      <span>Updated: <strong id="last-update">—</strong></span>
      <span>Symbols: <strong id="sym-count" style="color:var(--orange)">0</strong></span>
      <span>Total candles: <strong id="candle-count" style="color:var(--green)">0</strong></span>
    </div>
  </header>
  <main>
    <ul class="tree-root" id="tree">
      <div class="empty">
        <span style="font-size:28px">🗄️</span>
        <span>Waiting for first backtest request…</span>
        <span style="font-size:10px">Send a request to /engine/sma_crossover and watch the tree grow</span>
      </div>
    </ul>
  </main>
</div>

<script>
// ─── constants ───────────────────────────────────────────────────────────────
const POLL_MS = 2000;

// ─── state ───────────────────────────────────────────────────────────────────
const expandState = {};   // nodeKey → bool
const loadState   = {};   // nodeKey → 'loading' | 'loaded' | 'error'
const prevCounts  = {};   // nodeKey → number  (for flash)

function expanded(key, def = true)  { return key in expandState ? expandState[key] : def; }
function setExpanded(key, v)        { expandState[key] = v; }

// ─── helpers ─────────────────────────────────────────────────────────────────
function fmt(n, dp = 2)     { return n == null ? '—' : Number(n).toFixed(dp); }
function fmtVol(n)          { return n >= 1000 ? (n/1000).toFixed(2)+'k' : Number(n).toFixed(4); }
function tfLabel(s)         { s=parseInt(s); return s>=3600?`${s/3600}h`:s>=60?`${s/60}m`:`${s}s`; }

function el(tag, props={}, ...kids) {
  const e = document.createElement(tag);
  for(const[k,v] of Object.entries(props)) {
    if(k==='class') e.className=v;
    else if(k==='style') e.setAttribute('style',v);
    else if(k.startsWith('data-')) e.setAttribute(k,v);
    else e[k]=v;
  }
  for(const c of kids) {
    if(c==null) continue;
    e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  }
  return e;
}
function bdg(t,c=''){return el('span',{class:`bdg ${c}`},t)}
function icon(e){return el('span',{class:'icon'},e)}

function flashRow(rowEl, key, val) {
  if(prevCounts[key]!==undefined && prevCounts[key]!==val){
    rowEl.classList.remove('flash'); void rowEl.offsetWidth; rowEl.classList.add('flash');
  }
  prevCounts[key]=val;
}

// ─── make a collapsible node ─────────────────────────────────────────────────
function makeNode(key, rowContent, childItems=null, defaultOpen=true){
  const hasKids = childItems && childItems.length>0;
  const open    = expanded(key, defaultOpen);
  const caretEl = el('span',{class:`caret ${hasKids?(open?'open':''):''} ${hasKids?'':'leaf'}`},'▶');

  const rowEl = el('div',{class:'row'}, caretEl, ...rowContent);
  const li    = el('li', {class:'node'}, rowEl);

  if(hasKids){
    const ul = el('ul',{class:`children ${open?'':'collapsed'}`},...childItems);
    li.appendChild(ul);
    rowEl.addEventListener('click',()=>{
      const nowOpen = !ul.classList.contains('collapsed');
      ul.classList.toggle('collapsed', nowOpen);
      caretEl.classList.toggle('open', !nowOpen);
      setExpanded(key,!nowOpen);
    });
  }
  return {node:li, row:rowEl, caret:caretEl};
}

// ─── make a lazy-loading node (expands to fetch data) ────────────────────────
function makeLazyNode(key, rowContent, fetchFn, renderFn, defaultOpen=false){
  const open    = expanded(key, defaultOpen);
  const caretEl = el('span',{class:`caret ${open?'open':''}` },'▶');
  const rowEl   = el('div',{class:'row'}, caretEl, ...rowContent);
  const li      = el('li', {class:'node'}, rowEl);
  let   detail  = null;  // the rendered detail block

  async function ensureLoaded(){
    if(loadState[key]==='loaded'||loadState[key]==='loading') return;
    loadState[key]='loading';

    const msg = el('div',{class:'tbl-msg'},'⏳ Loading…');
    li.appendChild(msg);

    try{
      const data = await fetchFn();
      msg.remove();
      detail = renderFn(data);
      li.appendChild(detail);
      loadState[key]='loaded';
    }catch(e){
      msg.textContent='⚠ Failed to load: '+e.message;
      loadState[key]='error';
    }
  }

  // if already open by default, kick off load
  if(open){ ensureLoaded(); }

  rowEl.addEventListener('click', async ()=>{
    const nowOpen = caretEl.classList.contains('open');
    caretEl.classList.toggle('open',!nowOpen);
    setExpanded(key,!nowOpen);

    if(!nowOpen){
      // expanding
      await ensureLoaded();
      if(detail) detail.style.display='';
    } else {
      // collapsing
      if(detail) detail.style.display='none';
    }
  });

  return {node:li, row:rowEl};
}

// ─── OHLCV table renderer ────────────────────────────────────────────────────
function renderOhlcvTable(data){
  const {rows, stats} = data;
  const maxVol  = stats.max_volume || 1;
  const minC    = stats.min_close;
  const rangeC  = (stats.max_close - minC) || 1;

  const thead = el('thead',{},
    el('tr',{},
      el('th',{},'Time'),
      el('th',{},''),        // candle body
      el('th',{},'Open'),
      el('th',{},'High'),
      el('th',{},'Low'),
      el('th',{},'Close'),
      el('th',{},'Volume'),
    )
  );

  const tbody = el('tbody',{});
  for(const r of rows){
    const bull   = r.close >= r.open;
    const doji   = r.close === r.open;
    const bodyEl = el('span',{class:`cbody ${doji?'doji':bull?'bull':'bear'}`});
    const volPct = maxVol>0 ? (r.volume/maxVol*100) : 0;
    const volBar = el('div',{class:'vol-bar-wrap'},
                     el('div',{class:'vol-bar-fill',style:`width:${volPct}%`}));
    const volCell= el('div',{class:'vol-cell'},volBar,el('span',{class:'vol-num'},fmtVol(r.volume)));

    tbody.appendChild(el('tr',{},
      el('td',{style:'color:var(--muted)'},r.time),
      el('td',{},bodyEl),
      el('td',{},fmt(r.open,4)),
      el('td',{style:'color:var(--blue)'},fmt(r.high,4)),
      el('td',{style:'color:var(--red)'},fmt(r.low,4)),
      el('td',{class:bull?'close-bull':'close-bear'},fmt(r.close,4)),
      el('td',{},volCell),
    ));
  }

  const tbl = el('table',{class:'candle-table'}, thead, tbody);
  return el('div',{class:'candle-wrap'}, tbl);
}

// ─── indicator value table renderer ──────────────────────────────────────────
function renderIndTable(data){
  const {rows, stats} = data;
  const minV  = stats.min;
  const range = (stats.max - minV) || 1;

  const thead = el('thead',{},
    el('tr',{},
      el('th',{},'Time'),
      el('th',{},'Value'),
    )
  );
  const tbody = el('tbody',{});
  for(const r of rows){
    const pct  = range>0 ? ((r.value-minV)/range*100) : 50;
    const bar  = el('div',{class:'ind-bar-wrap'},
                   el('div',{class:'ind-bar-fill',style:`width:${pct}%`}));
    const cell = el('div',{class:'ind-val-cell'}, bar, el('span',{},fmt(r.value,6)));

    tbody.appendChild(el('tr',{},
      el('td',{style:'color:var(--muted)'},r.time),
      el('td',{},cell),
    ));
  }

  return el('div',{class:'ind-wrap'},el('table',{class:'ind-table'},thead,tbody));
}

// ─── build indicator-date lazy nodes ─────────────────────────────────────────
function renderIndDateNodes(sym, tf, indName, byDate){
  return Object.entries(byDate).sort().map(([date,cnt])=>{
    const key = `${sym}.ind.${tf}.${indName}.${date}`;
    const {node, row} = makeLazyNode(
      key,
      [
        icon('📅'),
        el('span',{class:'lbl date'},date),
        bdg(`${cnt.toLocaleString()} values`,'g'),
      ],
      async ()=>{
        const r = await fetch(`/meta/indicator_values?symbol=${sym}&date=${date}&tf=${tf}&name=${indName}`);
        if(!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      },
      renderIndTable
    );
    flashRow(row, key, cnt);
    return node;
  });
}

// ─── build OHLCV-date lazy nodes ────────────────────────────────────────────
function renderDateNodes(sym, tf, byDate, barColor='var(--blue)'){
  const maxC = Math.max(...Object.values(byDate));
  return Object.entries(byDate).sort().map(([date,cnt])=>{
    const key = `${sym}.q.${tf}.${date}`;
    const pct = maxC>0?(cnt/maxC*100):0;
    const barWrap = el('div',{style:'width:70px;height:3px;border-radius:2px;background:var(--border);overflow:hidden;flex-shrink:0'},
                     el('div',{style:`width:${pct}%;height:100%;border-radius:2px;background:${barColor};min-width:1px`}));

    const {node,row} = makeLazyNode(
      key,
      [
        icon('📅'),
        el('span',{class:'lbl date'},date),
        barWrap,
        bdg(`${cnt.toLocaleString()} candles`, tf===60?'g':'p'),
      ],
      async ()=>{
        const r = await fetch(`/meta/quotes?symbol=${sym}&date=${date}&tf=${tf}`);
        if(!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      },
      renderOhlcvTable
    );
    flashRow(row, key, cnt);
    return node;
  });
}

// ─── render one symbol ───────────────────────────────────────────────────────
function renderSymbol(sym, data){

  // BASE QUOTES
  const base       = data.base;
  const baseDates  = renderDateNodes(sym, 60, base.by_date, 'var(--green)');
  const {node:baseNode} = makeNode(`${sym}.base`, [
    icon('📦'),
    el('span',{class:'lbl section'},'base_quotes'),
    el('span',{style:'color:var(--muted);font-size:10px'},' 1-min raw'),
    bdg(`${base.dates} dates`,'b'),
    bdg(`${base.total_candles.toLocaleString()} candles`,'g'),
  ], baseDates, true);

  // RESAMPLED QUOTES
  const resampled  = data.resampled;
  const resTfNodes = Object.entries(resampled).sort().map(([tf, tfData])=>{
    const dNodes = renderDateNodes(sym, parseInt(tf), tfData.by_date, 'var(--purple)');
    const {node:tfNode, row:tfRow} = makeNode(`${sym}.res.${tf}`,[
      icon('⏱'),
      el('span',{class:'lbl tf'},`tf=${tf}s`),
      el('span',{style:'color:var(--muted);font-size:10px'},` (${tfLabel(tf)} bars)`),
      bdg(`${tfData.dates} dates`,'b'),
      bdg(`${tfData.total_candles.toLocaleString()} candles`,'p'),
    ], dNodes, true);
    flashRow(tfRow, `${sym}.res.${tf}`, tfData.total_candles);
    return tfNode;
  });
  const {node:resNode} = makeNode(`${sym}.res`,[
    icon('🔀'),
    el('span',{class:'lbl section'},'resampled_quotes'),
    bdg(`${Object.keys(resampled).length} timeframe(s)`,'y'),
  ], resTfNodes, true);

  // INDICATORS
  const indicators = data.indicators;
  const indTfNodes = Object.entries(indicators).sort().map(([tf, indMap])=>{
    const indNameNodes = Object.entries(indMap).sort().map(([indName, indData])=>{
      const dateNodes = renderIndDateNodes(sym, parseInt(tf), indName, indData.by_date);
      const {node:indNode, row:indRow} = makeNode(`${sym}.ind.${tf}.${indName}`,[
        icon('📈'),
        el('span',{class:'lbl ind'},indName),
        bdg(`${indData.dates} dates`,''),
        bdg(`${indData.total_values.toLocaleString()} values`,'g'),
      ], dateNodes, true);
      flashRow(indRow, `${sym}.ind.${tf}.${indName}`, indData.total_values);
      return indNode;
    });
    const {node:tfNode, row:tfRow} = makeNode(`${sym}.ind.${tf}`,[
      icon('⏱'),
      el('span',{class:'lbl tf'},`tf=${tf}s`),
      el('span',{style:'color:var(--muted);font-size:10px'},` (${tfLabel(tf)})`),
      bdg(`${Object.keys(indMap).length} indicator(s)`,'y'),
    ], indNameNodes, true);
    flashRow(tfRow, `${sym}.ind.${tf}`,
      Object.values(indMap).reduce((s,v)=>s+v.total_values,0));
    return tfNode;
  });
  const {node:indSecNode} = makeNode(`${sym}.ind`,[
    icon('📊'),
    el('span',{class:'lbl section'},'indicators'),
    bdg(`${Object.keys(indicators).length} tf(s)`,'y'),
  ], indTfNodes, true);

  // SYMBOL ROOT
  const totalCandles = base.total_candles +
    Object.values(resampled).reduce((s,t)=>s+t.total_candles,0);
  const {node:symNode, row:symRow} = makeNode(`${sym}.root`,[
    icon('🪙'),
    el('span',{class:'lbl symbol'},sym),
    bdg(`${totalCandles.toLocaleString()} candles total`),
  ], [baseNode, resNode, indSecNode], true);
  flashRow(symRow, `${sym}.root`, totalCandles);

  return symNode;
}

// ─── full tree render ────────────────────────────────────────────────────────
function renderTree(data){
  const symbols = data.symbols;
  const symKeys = Object.keys(symbols);
  const totalC  = symKeys.reduce((s,k)=>{
    const d=symbols[k];
    return s+d.base.total_candles+Object.values(d.resampled).reduce((rs,t)=>rs+t.total_candles,0);
  },0);

  document.getElementById('sym-count').textContent    = symKeys.length;
  document.getElementById('candle-count').textContent = totalC.toLocaleString();

  if(!symKeys.length){
    document.getElementById('tree').innerHTML=`
      <div class="empty">
        <span style="font-size:28px">🗄️</span>
        <span>No data yet — send a backtest request to populate meta_data</span>
      </div>`;
    return;
  }

  const symNodes = symKeys.sort().map(s=>renderSymbol(s,symbols[s]));
  const {node:root} = makeNode('meta_data',[
    icon('🗄️'),
    el('span',{class:'lbl root'},'meta_data'),
    bdg(`${symKeys.length} symbol(s)`,'b'),
    bdg(`${totalC.toLocaleString()} total candles`,'g'),
  ], symNodes, true);

  const tree = document.getElementById('tree');
  tree.innerHTML='';
  tree.appendChild(root);
}

// ─── polling ─────────────────────────────────────────────────────────────────
async function poll(){
  try{
    const r = await fetch('/meta/snapshot');
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    renderTree(d);
    const now=new Date();
    document.getElementById('last-update').textContent=
      now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    document.getElementById('error-msg').style.display='none';
  } catch(e){
    document.getElementById('error-msg').style.display='flex';
    console.error('poll failed:',e);
  }
}

poll();
setInterval(poll, POLL_MS);
</script>
</body>
</html>
